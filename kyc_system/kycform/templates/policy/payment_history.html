{% extends "policy/base_policy.html" %}

{% block title %}Payment History | RJBCL{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h4 class="mb-1">Payment History</h4>
    <nav class="small">
      <a href="{% url 'kyc:dashboard' %}">Dashboard</a> /
      <span class="text-muted">Payment History</span>
    </nav>
  </div>
  <a href="{% url 'kyc:dashboard' %}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i> Back
  </a>
</div>

<div class="card mb-3">
  <div class="card-body d-flex gap-2 align-items-center">
    <input id="paymentPolicyFilter" type="text" class="form-control w-25" placeholder="Policy Number">
    <button id="paymentFilterBtn" class="btn btn-outline-primary btn-sm">
      <i class="bi bi-funnel"></i> Filter
    </button>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <div class="small text-muted mb-3" id="payment-total">Paid: NPR 0 | Premium: NPR 0</div>
    <table id="paymentTable" class="table table-striped table-bordered align-middle w-100">
      <thead class="table-light">
        <tr>
          <th>Policy</th>
          <th>Paid Date</th>
          <th>Paid Amount</th>
          <th>Premium</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener("DOMContentLoaded", function () {
  const table = $('#paymentTable').DataTable({
    paging: true,
    searching: false,
    ordering: true,
    info: true,
    pageLength: 10
  });

  function loadPaymentHistory(filterNo) {
    fetch("/api/policy/payment-history/", { credentials: "same-origin" })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        const rows = data.rows || [];
        const total = data.total || {};
        document.getElementById("payment-total").innerText =
          "Paid: NPR " + Number(total.paid_amount || 0).toLocaleString() +
          " | Premium: NPR " + Number(total.premium || 0).toLocaleString();

        table.clear();
        rows
          .filter(function (r) {
            if (!filterNo) return true;
            return String(r.policy_no || "").toLowerCase().indexOf(filterNo.toLowerCase()) !== -1;
          })
          .forEach(function (r) {
            table.row.add([
              r.policy_no || "-",
              r.premium_paid_date || "-",
              "NPR " + Number(r.paid_amount || 0).toLocaleString(),
              "NPR " + Number(r.premium || 0).toLocaleString(),
              r.installment_type || "-"
            ]);
          });

        table.draw();
      });
  }

  loadPaymentHistory("");
  document.getElementById("paymentFilterBtn").addEventListener("click", function () {
    loadPaymentHistory(document.getElementById("paymentPolicyFilter").value || "");
  });
});
</script>
{% endblock %}

{% load static %}
<div class="sidebar">
  <div class="brand-block">
    <img src="{% static 'images/rjbclogo.png' %}" alt="RJBCL Logo" class="company-logo">
    <p class="brand-title">Policy Holder Portal</p>
  </div>

  <nav class="nav flex-column">
    <div class="nav-section">Overview</div>
    <a class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
      href="{% url 'kyc:dashboard' %}">
      <i class="bi bi-speedometer2 me-2"></i>
      Dashboard
    </a>

    <a class="{% if request.resolver_match.url_name == 'policy_profile' %}active{% endif %}"
      href="{% url 'kyc:policy_profile' %}">
      <i class="bi bi-person me-2"></i>
      My Profile
    </a>

    <a class="{% if request.resolver_match.url_name == 'policy_policies' %}active{% endif %}"
      href="{% url 'kyc:policy_policies' %}">
      <i class="bi bi-files me-2"></i>
      My Policies
    </a>

    <a class="{% if request.resolver_match.url_name == 'policy_payment_history' %}active{% endif %}"
      href="{% url 'kyc:policy_payment_history' %}">
      <i class="bi bi-receipt me-2"></i>
      Payment History
    </a>

    <a class="{% if request.resolver_match.url_name == 'policy_renewal_pending' %}active{% endif %}"
      href="{% url 'kyc:policy_renewal_pending' %}">
      <i class="bi bi-clock-history me-2"></i>
      Renewal Pending
    </a>

    <div class="nav-section">Services</div>
    <a class="{% if request.resolver_match.url_name == 'policy_payment' %}active{% endif %}"
      href="{% url 'kyc:policy_payment' %}">
      <i class="bi bi-credit-card me-2"></i>
      Payment
    </a>

    <a class="{% if request.resolver_match.url_name == 'policy_loan_repayment' %}active{% endif %}"
      href="{% url 'kyc:policy_loan_repayment' %}">
      <i class="bi bi-cash-coin me-2"></i>
      Policy Loan Repayment
    </a>

    <a class="{% if request.resolver_match.url_name == 'policy_foreign_policy' %}active{% endif %}"
      href="{% url 'kyc:policy_foreign_policy' %}">
      <i class="bi bi-globe2 me-2"></i>
      Foreign Policy
    </a>

    <a class="{% if request.resolver_match.url_name == 'policy_claim_process' %}active{% endif %}"
      href="{% url 'kyc:policy_claim_process' %}">
      <i class="bi bi-file-earmark-medical me-2"></i>
      Claim Process
    </a>

    <a class="{% if request.resolver_match.url_name == 'policy_rastra_sewak' %}active{% endif %}"
      href="{% url 'kyc:policy_rastra_sewak' %}">
      <i class="bi bi-building me-2"></i>
      Rastra Sewak
    </a>

    <div class="nav-section">KYC</div>
    <a href="{% url 'kyc:kyc_form' %}">
      <i class="bi bi-file-earmark-text me-2"></i>
      KYC Form
    </a>

    <hr>
    <a href="{% url 'kyc:policy_logout' %}" class="text-danger" onclick="return confirm('Logout?')">
      <i class="bi bi-box-arrow-right me-2"></i>
      Logout
    </a>
  </nav>
</div>

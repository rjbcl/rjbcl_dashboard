<div class="topbar">
  <div class="d-flex align-items-center gap-2">
    <button id="sidebarToggle"
            class="btn btn-light d-flex align-items-center justify-content-center"
            style="width:38px;height:38px;border:1px solid #e8eef8;">
      <i class="bi bi-list fs-5"></i>
    </button>

    <div>
      <p class="topbar-title">{{ page_title|default:"Dashboard" }}</p>
      <p class="topbar-sub">Home / {{ page_title|default:"Dashboard" }}</p>
    </div>
  </div>

  <div class="d-flex align-items-center gap-3">
    <span class="small text-muted fw-semibold">
      Hi, {% if user and user.first_name %}{{ user.first_name }}{% if user.last_name %} {{ user.last_name }}{% endif %}{% else %}Policy Holder{% endif %}
    </span>
    <a href="{% url 'kyc:policy_logout' %}" class="text-danger" title="Logout" onclick="return confirm('Logout?')">
      <i class="bi bi-box-arrow-right fs-5"></i>
    </a>
  </div>
</div>

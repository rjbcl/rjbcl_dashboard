{% extends "policy/base_policy.html" %}

{% block title %}My Policies | RJBCL{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h4 class="mb-1">My Policies</h4>
    <nav class="small">
      <a href="{% url 'kyc:dashboard' %}">Dashboard</a> /
      <span class="text-muted">My Policies</span>
    </nav>
  </div>
  <a href="{% url 'kyc:dashboard' %}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i> Back
  </a>
</div>

<div class="card mb-3">
  <div class="card-body d-flex gap-2 align-items-center">
    <input id="policyFilter" type="text" class="form-control w-25" placeholder="Policy Number">
    <button id="policyFilterBtn" class="btn btn-outline-primary btn-sm">
      <i class="bi bi-funnel"></i> Filter
    </button>
    <button id="policyExportBtn" class="btn btn-outline-success btn-sm">
      <i class="bi bi-download"></i> Export All
    </button>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <table id="policiesTable" class="table table-striped table-bordered align-middle w-100">
      <thead class="table-light">
        <tr>
          <th>Policy No</th>
          <th>Plan</th>
          <th>Term</th>
          <th>Premium</th>
          <th>Frequency</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="d-flex justify-content-between align-items-center mt-3">
      <button id="policiesPrevBtn" class="btn btn-outline-secondary btn-sm" disabled>
        <i class="bi bi-chevron-left"></i> Prev
      </button>
      <span id="policiesPageInfo" class="small text-muted">Page 0 of 0</span>
      <button id="policiesNextBtn" class="btn btn-outline-secondary btn-sm" disabled>
        Next <i class="bi bi-chevron-right"></i>
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener("DOMContentLoaded", function () {
  const table = $('#policiesTable').DataTable({
    paging: false,
    searching: false,
    ordering: true,
    info: false
  });

  let currentPage = 1;
  const pageSize = 10;
  let currentFilter = "";
  let totalPages = 0;

  function syncPager() {
    document.getElementById("policiesPageInfo").innerText = "Page " + (totalPages ? currentPage : 0) + " of " + totalPages;
    document.getElementById("policiesPrevBtn").disabled = currentPage <= 1;
    document.getElementById("policiesNextBtn").disabled = currentPage >= totalPages;
  }

  function loadPolicies(page) {
    currentPage = page || 1;
    syncPager();

    fetch(`/api/policy/policies/?policy_no=${encodeURIComponent(currentFilter)}&page=${currentPage}&page_size=${pageSize}`, { credentials: "same-origin" })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        const rows = data.rows || [];
        const pagination = data.pagination || {};
        totalPages = Number(pagination.total_pages || 0);
        currentPage = Number(pagination.page || currentPage);
        syncPager();
        table.clear();

        rows.forEach(function (r) {
          table.row.add([
            r.policy_number || "-",
            r.plan_name || "-",
            r.term || "-",
            "NPR " + Number(r.policy_premium || 0).toLocaleString(),
            r.policy_premium_frequency || "-",
            r.current_status || "-"
          ]);
        });

        table.draw();
      });
  }

  loadPolicies(1);
  document.getElementById("policyFilterBtn").addEventListener("click", function () {
    currentFilter = document.getElementById("policyFilter").value || "";
    loadPolicies(1);
  });
  function toCsvValue(v) {
    const s = String(v == null ? "" : v);
    return '"' + s.replace(/"/g, '""') + '"';
  }
  async function exportAllPolicies() {
    const btn = document.getElementById("policyExportBtn");
    btn.disabled = true;
    btn.innerText = "Exporting...";
    try {
      const filter = document.getElementById("policyFilter").value || "";
      const exportPageSize = 100;
      let page = 1;
      let total = 1;
      const allRows = [];

      while (page <= total) {
        const res = await fetch(`/api/policy/policies/?policy_no=${encodeURIComponent(filter)}&page=${page}&page_size=${exportPageSize}`, { credentials: "same-origin" });
        const data = await res.json();
        total = Number((data.pagination || {}).total_pages || 1);
        (data.rows || []).forEach(r => allRows.push(r));
        page += 1;
      }

      const lines = [];
      lines.push(["Policy No","Plan","Term","Premium","Frequency","Status"].map(toCsvValue).join(","));
      allRows.forEach(r => {
        lines.push([
          r.policy_number, r.plan_name, r.term, r.policy_premium, r.policy_premium_frequency, r.current_status
        ].map(toCsvValue).join(","));
      });
      const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "policy_policies.csv";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-download"></i> Export All';
    }
  }
  document.getElementById("policyExportBtn").addEventListener("click", exportAllPolicies);
  document.getElementById("policiesPrevBtn").addEventListener("click", function () {
    if (currentPage > 1) loadPolicies(currentPage - 1);
  });
  document.getElementById("policiesNextBtn").addEventListener("click", function () {
    if (currentPage < totalPages) loadPolicies(currentPage + 1);
  });
});
</script>
{% endblock %}

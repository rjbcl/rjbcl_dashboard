{% extends "policy/base_policy.html" %}

{% block title %}My Policies | RJBCL{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h4 class="mb-1">My Policies</h4>
    <nav class="small">
      <a href="{% url 'kyc:dashboard' %}">Dashboard</a> /
      <span class="text-muted">My Policies</span>
    </nav>
  </div>
  <a href="{% url 'kyc:dashboard' %}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i> Back
  </a>
</div>

<div class="card mb-3">
  <div class="card-body d-flex gap-2 align-items-center">
    <input id="policyFilter" type="text" class="form-control w-25" placeholder="Policy Number">
    <button id="policyFilterBtn" class="btn btn-outline-primary btn-sm">
      <i class="bi bi-funnel"></i> Filter
    </button>
  </div>
</div>

<div class="card">
  <div class="card-body">
    <table id="policiesTable" class="table table-striped table-bordered align-middle w-100">
      <thead class="table-light">
        <tr>
          <th>Policy No</th>
          <th>Plan</th>
          <th>Term</th>
          <th>Premium</th>
          <th>Frequency</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener("DOMContentLoaded", function () {
  const table = $('#policiesTable').DataTable({
    paging: true,
    searching: false,
    ordering: true,
    info: true,
    pageLength: 10
  });

  function loadPolicies(filterNo) {
    fetch("/api/policy/policies/", { credentials: "same-origin" })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        const rows = data.rows || [];
        table.clear();

        rows
          .filter(function (r) {
            if (!filterNo) return true;
            return String(r.policy_number || "").toLowerCase().indexOf(filterNo.toLowerCase()) !== -1;
          })
          .forEach(function (r) {
            table.row.add([
              r.policy_number || "-",
              r.plan_name || "-",
              r.term || "-",
              "NPR " + Number(r.policy_premium || 0).toLocaleString(),
              r.policy_premium_frequency || "-",
              r.current_status || "-"
            ]);
          });

        table.draw();
      });
  }

  loadPolicies("");
  document.getElementById("policyFilterBtn").addEventListener("click", function () {
    loadPolicies(document.getElementById("policyFilter").value || "");
  });
});
</script>
{% endblock %}

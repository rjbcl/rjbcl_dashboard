{% extends "agent/base_agent.html" %}
{% load static %}

{% block title %}Agent Hierarchy | RJBCL{% endblock %}

{% block content %}

<!-- PAGE HEADER -->
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h4 class="mb-1">Agent Hierarchy</h4>
    <nav class="small">
      <a href="{% url 'kyc:agent_dashboard' %}">Dashboard</a> /
      <span class="text-muted">Agent Hierarchy</span>
    </nav>
  </div>

  <a href="{% url 'kyc:agent_dashboard' %}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i> Back
  </a>
</div>

<!-- FILTER BAR -->
<div class="card mb-3">
  <div class="card-body d-flex gap-2 align-items-center">
    <input type="text" class="form-control w-25" placeholder="Agent Code">
    <button class="btn btn-outline-primary btn-sm">
      <i class="bi bi-funnel"></i> Filter
    </button>
  </div>
</div>

<!-- TABLE -->
<div class="card shadow-sm">
  <div class="card-body">
    <table id="agentHierarchyTable" class="table table-striped table-bordered w-100">

      <thead class="table-light">
        <tr>
          <th>SN</th>
          <th>Agent</th>
          <th>Mobile No.</th>
          <th>Address</th>
          <th>Licence Status</th>
        </tr>
      </thead>

      <tbody>
      </tbody>

    </table>
  </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script>
$(document).ready(function () {

  const table = $('#agentHierarchyTable').DataTable({
    pageLength: 10,
    ordering: true,
    searching: true,
    destroy: true   // 🔑 important
  });

  function loadHierarchy(agentCode = "") {

    table.clear().draw();

   fetch('/api/agent/hierarchy/', {
  credentials: 'same-origin'
})

    .then(res => res.json())
    .then(data => {

      console.log("Hierarchy API:", data);

      if (!data.rows || data.rows.length === 0) {
        console.warn("No rows returned");
        return;
      }

      data.rows.forEach((row, index) => {
        table.row.add([
          index + 1,
          `<strong>${row.agent_code}</strong><br>
           <small class="text-muted">${row.agent_name}</small>`,
          row.mobile ?? "-",
          row.address ?? "-",
          `<span class="badge rounded-pill ${
            row.license_status === "ACTIVE"
              ? "text-success border border-success"
              : "text-danger border border-danger"
          }">
            ${row.license_status}
          </span>`
        ]);
      });

      table.draw(false);   // 🔑 critical

    })
    .catch(err => console.error("Hierarchy error:", err));
  }

  // initial load
  loadHierarchy();

  // filter
  $('.btn-outline-primary').on('click', function () {
    const agentCode = $('input[placeholder="Agent Code"]').val();
    loadHierarchy(agentCode);
  });

});
</script>


{% endblock %}
